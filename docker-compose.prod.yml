# Compose produksi Tokopudidi — single VPS, akses via IP (port 80).
# Jalankan dengan: docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# Caddy (port 80) jadi reverse proxy:
#   /api/*       -> api:4000
#   /socket.io/* -> api:4000 (websocket)
#   selainnya    -> web:3000
# Hanya port 80 (Caddy) yang diekspos ke publik; service lain hanya di network internal.

services:
  postgres:
    image: postgres:15-alpine
    container_name: tokopudidi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tokopudidi-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: tokopudidi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: buat bucket MinIO bila belum ada (siap dipakai saat fitur upload aktif).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb -p local/$${S3_BUCKET} || true;
      mc anonymous set download local/$${S3_BUCKET} || true;
      echo 'minio bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: tokopudidi-api:latest
    container_name: tokopudidi-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    image: tokopudidi-web:latest
    container_name: tokopudidi-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: tokopudidi-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
  caddyconfig:
