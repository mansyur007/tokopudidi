name: Deploy to VPS

# Auto-deploy ke VPS setiap ada push/merge ke `main`.
# Bisa juga dipicu manual lewat tab Actions (workflow_dispatch).
on:
  push:
    branches: [main]
    # Perubahan dokumentasi tidak perlu memicu rebuild/deploy.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

# Hindari deploy tumpang-tindih: kalau ada run baru, batalkan yang lama.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH ke VPS & rebuild
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            cd /opt/tokopudidi
            C="docker compose --env-file .env.production -f docker-compose.prod.yml"

            echo "== Pull main =="
            git fetch origin main
            # reset --hard hanya menyentuh file ter-track; .env.production (untracked) aman.
            git reset --hard origin/main

            echo "== Build images =="
            $C build

            echo "== Start infra (postgres/redis/minio) =="
            $C up -d postgres redis minio

            echo "== DB migrate deploy =="
            # Jalankan migrasi SEBELUM api/web naik, supaya app tidak melayani schema lama.
            $C run --rm -T -w /app api npm run prisma:deploy -w @tokopudidi/database

            echo "== Up semua service =="
            $C up -d

            # Pintu depan (Caddy + routing) kini dimiliki stack EMHA Universe
            # (/opt/emhauniverse), bukan tokopudidi lagi. Deploy ini hanya
            # mengurus service milik tokopudidi sendiri; tidak menyentuh Caddy.

            echo "== Bersihkan image lama =="
            docker image prune -f

            echo "== Smoke test (lewat Caddy milik emhauniverse, resolve ke localhost) =="
            # Tokopudidi di subdomain toko.emha.space (root host dipakai portal EMHA Universe).
            HOST=toko.emha.space
            sleep 8
            curl -fsS --retry 5 --retry-delay 3 --retry-connrefused \
              --resolve $HOST:443:127.0.0.1 https://$HOST/api/health
            echo
            curl -fsS -o /dev/null --retry 5 --retry-delay 3 --retry-connrefused \
              --resolve $HOST:443:127.0.0.1 https://$HOST/
            echo "== Smoke test OK =="

            echo "== Status =="
            $C ps
