<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokopudidi — Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #1FA463;
      --green-tint: #e8f5ee;
      --red: #e5484d;
      --red-tint: #fdecec;
      --line: #ededed;
      --line-dark: #d4d7da;
      --muted: #8a8f96;
      --page-bg: #f3f4f5;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: var(--page-bg);
      color: #2e3137;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font-family: inherit; }
    .wrap { max-width: 1208px; margin: 0 auto; padding-left: 24px; padding-right: 24px; }

    /* header */
    .icon-btn { position: relative; background: none; border: none; padding: 8px; border-radius: 8px; color: #4a4e55; cursor: pointer; display: grid; place-items: center; }
    .icon-btn:hover { background: #f3f4f5; }
    .icon-badge { position: absolute; top: 2px; right: 2px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; display: grid; place-items: center; }
    .ghost-btn { background: none; border: none; cursor: pointer; color: inherit; padding: 0; font-size: 13px; }
    .ghost-btn:hover { color: var(--green); }
    .search-box { flex: 1; display: flex; align-items: center; gap: 10px; background: #fff; border: 1.5px solid var(--line); border-radius: 10px; padding: 0 14px; height: 42px; transition: border-color .15s; }
    .search-box:focus-within { border-color: var(--green); }
    .search-box input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; font-family: inherit; }

    /* hero card */
    .hero-card { display: flex; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 22px 26px; }
    .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-chip { display: inline-flex; align-items: center; gap: 7px; background: #fff; border: 1px solid var(--line); border-radius: 22px; padding: 7px 13px; font-size: 12.5px; font-weight: 600; color: #3a3e45; cursor: pointer; transition: all .15s; }
    .cat-chip:hover { border-color: var(--green); color: var(--green); }
    .cat-chip-icon { color: var(--green); display: grid; place-items: center; }
    .topup-tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 6px 0; font-size: 13px; cursor: pointer; font-family: inherit; }
    .topup-input { border: 1.5px solid var(--line); border-radius: 9px; height: 42px; padding: 0 12px; font-size: 13.5px; font-family: inherit; outline: none; flex: 1; min-width: 0; }
    .topup-input:focus { border-color: var(--green); }

    /* carousel */
    .carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; color: #2e3137; display: grid; place-items: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .carousel-arrow:hover { background: #fff; }

    /* feed */
    .feed-tab { background: none; border: none; border-bottom: 3px solid transparent; padding: 10px 0; font-size: 14px; cursor: pointer; font-family: inherit; display: flex; align-items: center; }
    .feed-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    @media (max-width: 1100px) { .feed-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 720px) { .feed-grid { grid-template-columns: repeat(2, 1fr); } }

    /* product card */
    .pcard { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: box-shadow .15s, transform .15s; display: flex; flex-direction: column; }
    .pcard:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.10); transform: translateY(-2px); }
    .pcard-minimal { border-color: #f0f0f0; }
    .pcard-name { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.7em; }
    .quick-add { position: absolute; bottom: 8px; right: 8px; width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,0.95); border: 1px solid var(--line); color: var(--green); display: grid; place-items: center; cursor: pointer; opacity: 0; transform: translateY(4px); transition: all .15s; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
    .pcard:hover .quick-add { opacity: 1; transform: translateY(0); }
    .quick-add:hover { background: var(--green); color: #fff; border-color: var(--green); }

    .load-more { background: #fff; border: 1.5px solid var(--green); color: var(--green); padding: 11px 60px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; }
    .load-more:hover { background: var(--green-tint); }

    /* detail */
    .detail-grid { display: grid; grid-template-columns: 340px 1fr 280px; gap: 28px; align-items: start; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; }
    @media (max-width: 1080px) { .detail-grid { grid-template-columns: 1fr; } }
    .buy-box { border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; position: sticky; top: 150px; }
    .qty-stepper { display: inline-flex; align-items: center; border: 1.5px solid var(--line); border-radius: 9px; overflow: hidden; }
    .qty-stepper button { width: 34px; height: 36px; border: none; background: #fff; color: var(--green); cursor: pointer; display: grid; place-items: center; }
    .qty-stepper button:disabled { color: var(--line-dark); cursor: not-allowed; }
    .qty-stepper span { width: 46px; text-align: center; font-weight: 700; font-size: 14px; border-left: 1.5px solid var(--line); border-right: 1.5px solid var(--line); height: 36px; line-height: 36px; }
    .page-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--line); background: #fff; cursor: pointer; font-weight: 700; font-size: 13px; font-family: inherit; }

    /* footer */
    .lang-pill { border: 1px solid var(--line-dark); background: #fff; border-radius: 7px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: #3a3e45; }
    .lang-pill.active { border-color: var(--green); color: var(--green); }
    .chat-fab { position: fixed; bottom: 22px; right: 22px; z-index: 50; display: flex; align-items: center; gap: 7px; background: #fff; border: 1px solid var(--line); box-shadow: 0 4px 16px rgba(0,0,0,0.14); border-radius: 24px; padding: 9px 16px; color: var(--green); cursor: pointer; }
    .chat-fab:hover { box-shadow: 0 6px 22px rgba(0,0,0,0.2); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 60; background: #2e3137; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.3); animation: toastIn .25s ease; max-width: 92vw; }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/placeholder.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/header.jsx"></script>
  <script type="text/babel" src="app/card.jsx"></script>
  <script type="text/babel" src="app/home.jsx"></script>
  <script type="text/babel" src="app/detail.jsx"></script>
  <script type="text/babel" src="app/footer.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
